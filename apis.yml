aid: quickwit
name: Quickwit
description: >
  Cloud-native search engine for log management and full-text search with a
  REST API for indexing documents, running queries, and managing search indexes
  at petabyte scale. Quickwit decouples compute from storage, enabling
  sub-second search and analytics directly on cloud object storage (S3, GCS,
  Azure Blob). It is open-source (Apache 2.0), written in Rust, and supports
  OpenTelemetry, Jaeger tracing, and an Elasticsearch-compatible API.
  Quickwit joined Datadog in January 2025.
