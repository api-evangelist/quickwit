apis:
  - aid: quickwit:quickwit-rest-api
    name: Quickwit REST API
    description: >
      The Quickwit REST API provides endpoints for indexing NDJSON documents,
      executing full-text and aggregation search queries, managing indexes and
      data sources, streaming field values, deleting documents by query, and
      monitoring cluster health. An OpenAPI specification is served at
      /openapi.json and a Swagger UI at /swagger-ui on any running Quickwit node.
    humanURL: https://quickwit.io/docs/reference/rest-api
